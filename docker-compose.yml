services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finarc
      POSTGRES_PASSWORD: finarc
      POSTGRES_DB: finarc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finarc"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://finarc:finarc@db:5432/finarc?schema=public"
      AUTH_SECRET: "finarc-dev-secret-change-in-production-2026"
      AUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
